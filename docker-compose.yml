# atelier — multi-agent code pipeline orchestrated with Prefect 3.
#
# Services:
#   - prefect-server: Prefect UI + API on :4200
#   - prefect-worker: runs the flows. Embeds the OpenHands V1 SDK so
#                     LLM-driven phases run in-process — no per-task
#                     agent containers.
#   - orchestrator:   FastAPI on :8000, dispatches Prefect deployments
#   - runner-quick-builder: builds the quick/full runner image (one-shot)
#   - runner-e2e-builder:   builds the E2E runner image (one-shot)

name: atelier

services:
  # -----------------------
  # Prefect Server (UI + API)
  # -----------------------
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: atelier-prefect-server
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      - PREFECT_UI_URL=http://localhost:4200
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_SERVER_ALLOW_EPHEMERAL_MODE=false
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pipeline

  # -----------------------
  # Prefect Worker (runs the flows)
  # -----------------------
  prefect-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: atelier-worker:latest
    container_name: atelier-prefect-worker
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    group_add:
      - "${DOCKER_GID:?DOCKER_GID must be set in .env}"
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
      runner-quick-builder:
        condition: service_completed_successfully
      runner-e2e-builder:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Path-aliased mounts: same absolute path on host and inside the
      # worker. This way `git worktree add` writes paths that resolve
      # from BOTH sides — users can run `git log/diff/commit` straight
      # from `worktrees/task-X/` on their host shell.
      - ${PWD}/worktrees:${PWD}/worktrees
      - ${PWD}/projects:${PWD}/projects
      - ${PWD}/logs:${PWD}/logs
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - DEFAULT_MODEL=${DEFAULT_MODEL:?DEFAULT_MODEL must be set in .env}
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-2}
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-2}
      - APP_ROOT=/app
      - WORKTREES_DIR=${PWD}/worktrees
      - PROJECTS_ROOT=${PWD}/projects
      - LOGS_DIR=${PWD}/logs
      # Used by the ephemeral runner containers (test gates). Kept under
      # the AGENT_* names because the worker's runner code reads them
      # via orchestrator.config; renaming to RUNNER_* would be a larger
      # cleanup orthogonal to v2 and is left for later.
      - AGENT_NETWORK=atelier_network
      - AGENT_UID=${HOST_UID:-1000}
      - AGENT_GID=${HOST_GID:-1000}
      - AGENT_MEM_LIMIT=${AGENT_MEM_LIMIT:-4g}
      - AGENT_CPU_LIMIT=${AGENT_CPU_LIMIT:-2.0}
      # OpenHands SDK iteration cap. Each iteration ≈ one LLM call +
      # one tool execution; with a slow local model this caps wall-clock.
      - OPENHANDS_MAX_ITERATIONS=${OPENHANDS_MAX_ITERATIONS:-30}
      - RUNNER_QUICK_IMAGE=atelier-runner-quick:latest
      - RUNNER_E2E_IMAGE=atelier-runner-e2e:latest
      # Shared secret for the internal /internal/consume-secret endpoint.
      # Must match the one on the orchestrator. Without it, flows cannot
      # retrieve the api_key from the new endpoints and will fail at start-up.
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN must be set in .env}
      - ORCHESTRATOR_INTERNAL_URL=http://orchestrator:8000
    command: >
      sh -c "
      prefect work-pool create atelier-pool --type process --overwrite || true &&
      prefect deploy --all --prefect-file /app/prefect.yaml &&
      prefect worker start --pool atelier-pool
      "
    networks:
      - pipeline

  # -----------------------
  # FastAPI (dispatches Prefect flows)
  # -----------------------
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: atelier-orchestrator:latest
    container_name: atelier-orchestrator
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    volumes:
      # Path-aliased: same absolute path on host and inside the
      # orchestrator. See the worker for the rationale.
      - ${PWD}/logs:${PWD}/logs
      - ${PWD}/data:${PWD}/data
      - ${PWD}/projects:${PWD}/projects
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - DEFAULT_MODEL=${DEFAULT_MODEL:?DEFAULT_MODEL must be set in .env}
      - DEPLOYMENT_NAME=atelier/default
      - APP_ROOT=/app
      - LOGS_DIR=${PWD}/logs
      - DATA_DIR=${PWD}/data
      - PROJECTS_ROOT=${PWD}/projects
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN must be set in .env}
      # Master key used to encrypt stored API keys in data/providers.json.
      # Empty = "stored providers" feature disabled (one-shot flow still works).
      - MASTER_ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY:-}
    networks:
      - pipeline

  # -------------------------------------------------------------
  # Runner-quick-builder: builds the runner image for unit/full tests.
  # -------------------------------------------------------------
  runner-quick-builder:
    build:
      context: .
      dockerfile: docker/runner-quick.Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: atelier-runner-quick:latest
    container_name: atelier-runner-quick-builder
    entrypoint: ["true"]
    restart: "no"

  # -------------------------------------------------------------
  # Runner-e2e-builder: builds the E2E runner image with Playwright.
  # (~1.5 GB, takes a while the first time)
  # -------------------------------------------------------------
  runner-e2e-builder:
    build:
      context: .
      dockerfile: docker/runner-e2e.Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: atelier-runner-e2e:latest
    container_name: atelier-runner-e2e-builder
    entrypoint: ["true"]
    restart: "no"

volumes:
  prefect-data:
    name: atelier_prefect-data

networks:
  pipeline:
    name: atelier_network
    driver: bridge
