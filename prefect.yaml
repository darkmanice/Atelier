# Declarative Prefect deployment. The worker applies it at start-up with
# `prefect deploy --all`.
#
# Defines a single deployment called "default" on the "atelier" flow.
# Invocation from the orchestrator:
#   run_deployment("atelier/default", parameters={...})

prefect-version: "3"

deployments:
  - name: default
    entrypoint: flows/pipeline.py:pipeline_flow
    work_pool:
      name: atelier-pool
    # Concurrency: at most N flow runs in parallel on this pool.
    # Honors MAX_CONCURRENT_TASKS from your .env.
    concurrency_limit: 2
    description: "Pipeline Implementer → Reviewer → Simplifier"
  - name: cleanup
    entrypoint: flows/pipeline.py:cleanup_task_flow
    work_pool:
      name: atelier-pool
    description: "Delete a task: remove its agent containers and tear down its preview"
